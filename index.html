<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Break Free PRO</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
}

header {
    background: #020617;
    padding: 15px;
    font-size: 22px;
}

.card {
    background: #1e293b;
    margin: 15px;
    padding: 20px;
    border-radius: 12px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

button.red {
    background: red;
}

.hidden { display:none; }

#panic {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:28px;
}
</style>
</head>

<body>

<header>🚀 Break Free PRO</header>

<!-- LOGIN -->
<div id="auth" class="card">
    <h2>Login</h2>
    <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <div class="card">
        <h2>🔥 Streak</h2>
        <h1 id="streak">0</h1>
        <button onclick="markClean()">Mark Clean</button>
        <button class="red" onclick="relapse()">Relapse</button>
    </div>

    <div class="card">
        <h2>⚠️ Urge Control</h2>
        <button onclick="panic()">PANIC</button>
    </div>

    <div class="card">
        <h2>🧠 Motivation</h2>
        <p id="msg"></p>
        <button onclick="newMsg()">New Message</button>
    </div>

</div>

<!-- PANIC SCREEN -->
<div id="panic" onclick="closePanic()">
    DO PUSHUPS NOW 💪<br><br>TAP TO EXIT
</div>

<script type="module">

// 🔥 IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCETSq2TD1RnJs0zvbuieTN3twaPBCHXMk",
  authDomain: "addiction-remove.firebaseapp.com",
  databaseURL: "https://addiction-remove-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "addiction-remove",
  storageBucket: "addiction-remove.firebasestorage.app",
  messagingSenderId: "711071133347",
  appId: "1:711071133347:web:c5fa35f0bf3e602f3b5916"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let uid = null;

// 🔐 GOOGLE LOGIN (REDIRECT)
window.googleLogin = async function () {
  await signInWithRedirect(auth, provider);
};

// 🔁 HANDLE REDIRECT RESULT
getRedirectResult(auth)
  .then((result) => {
    if (result) {
      uid = result.user.uid;
      startApp();
    }
  })
  .catch((error) => {
    console.log(error);
  });

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    startApp();
  }
});

// START APP
async function startApp() {
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  loadData();
  newMsg();
}

// LOAD DATA
async function loadData() {
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    document.getElementById("streak").innerText = snap.data().streak;
  } else {
    await setDoc(ref, {
      streak: 0,
      createdAt: new Date()
    });
    document.getElementById("streak").innerText = 0;
  }
}

// MARK CLEAN
window.markClean = async function () {
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  let s = snap.data().streak + 1;

  await updateDoc(ref, { streak: s });
  document.getElementById("streak").innerText = s;
};

// RELAPSE
window.relapse = async function () {
  const ref = doc(db, "users", uid);

  await updateDoc(ref, { streak: 0 });
  document.getElementById("streak").innerText = 0;
};

// PANIC
window.panic = function () {
  document.getElementById("panic").style.display = "flex";
};

window.closePanic = function () {
  document.getElementById("panic").style.display = "none";
};

// MOTIVATION
window.newMsg = function () {
  const msgs = [
    "Stay strong 💪",
    "Control your mind 🧠",
    "You are improving 🔥",
    "Discipline wins",
    "One urge defeated = power gained"
  ];

  document.getElementById("msg").innerText =
    msgs[Math.floor(Math.random() * msgs.length)];
};

</script>

</body>
</html>
